steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/mobi-backend-491410/cloud-run-source-deploy/repair-backend:latest'
      - '-f'
      - '-'
      - '.'
    input:
      | 
      FROM node:20-slim
      WORKDIR /app
      COPY server_dist/ ./server_dist/
      COPY server/templates/ ./server/templates/ 2>/dev/null || true
      COPY static-build/ ./static-build/ 2>/dev/null || true
      COPY patches/ ./patches/ 2>/dev/null || true
      COPY shared/ ./shared/ 2>/dev/null || true
      COPY bin/ ./bin/ 2>/dev/null || true
      RUN mkdir -p ./bin && chmod +x ./bin/ffmpeg 2>/dev/null || true
      EXPOSE 8080
      ENV PORT=8080 NODE_ENV=production
      CMD ["node", "server_dist/index.js"]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/mobi-backend-491410/cloud-run-source-deploy/repair-backend:latest'

  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - '--deploy'
      - 'repair-backendarun'
      - '--image=asia-south1-docker.pkg.dev/mobi-backend-491410/cloud-run-source-deploy/repair-backend:latest'
      - '--project=mobi-backend-491410'
      - '--region=asia-south1'

images:
  - 'asia-south1-docker.pkg.dev/mobi-backend-491410/cloud-run-source-deploy/repair-backend:latest'
