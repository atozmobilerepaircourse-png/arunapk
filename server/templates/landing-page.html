<!doctype html>
<html>
  <head>
    <title>MOBI - Mobile Technician Community</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0a1628 0%, #0d2847 50%, #0a1628 100%);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
      }
      .hero {
        width: 100%;
        max-height: 400px;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 0;
        opacity: 0.15;
      }
      .hero img { width: 100%; height: auto; display: block; object-fit: cover; }
      .content {
        position: relative;
        z-index: 1;
        max-width: 440px;
        width: 100%;
        margin: 0 auto;
        padding: 40px 24px 48px;
        text-align: center;
      }
      .logo-circle {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #E8704A, #FF6B2C);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 36px;
        font-weight: 900;
        color: #fff;
        letter-spacing: -2px;
        box-shadow: 0 8px 32px rgba(232,112,74,0.4);
      }
      h1 {
        font-size: 30px;
        font-weight: 800;
        margin-bottom: 10px;
        color: #fff;
      }
      .subtitle {
        font-size: 15px;
        color: #8fa8c8;
        margin-bottom: 36px;
        line-height: 1.6;
      }
      .btn-primary {
        display: block;
        padding: 16px 28px;
        font-size: 17px;
        font-weight: 700;
        border: none;
        border-radius: 14px;
        text-decoration: none;
        color: #fff;
        background: linear-gradient(135deg, #E8704A, #FF6B2C);
        margin-bottom: 14px;
        transition: opacity 0.2s;
        box-shadow: 0 4px 20px rgba(232,112,74,0.35);
      }
      .btn-primary:hover { opacity: 0.9; }
      .btn-secondary {
        display: block;
        padding: 14px 28px;
        font-size: 15px;
        font-weight: 600;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 14px;
        text-decoration: none;
        color: #fff;
        background: rgba(255,255,255,0.08);
        margin-bottom: 14px;
        transition: all 0.2s;
      }
      .btn-secondary:hover { background: rgba(255,255,255,0.15); }
      .divider {
        margin: 24px 0;
        border: none;
        border-top: 1px solid rgba(255,255,255,0.1);
      }
      .store-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 8px;
      }
      .store-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 10px;
        text-decoration: none;
        color: #fff;
        background: rgba(255,255,255,0.06);
        transition: all 0.2s;
      }
      .store-btn:hover { background: rgba(255,255,255,0.14); }
      .badge {
        display: inline-block;
        padding: 4px 10px;
        background: rgba(232,112,74,0.2);
        border: 1px solid rgba(232,112,74,0.4);
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        color: #E8704A;
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .footer {
        margin-top: 40px;
        color: #4a6a8a;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <img src="/assets/mobi-banner.jpeg" alt="MOBI" />

    <div class="content">

      <div class="badge">India's #1 Repair Network</div>

          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">

          </svg>
          App Store
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.mobi.app" class="store-btn" target="_blank">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z" />

      </div>

      <div class="footer">MOBI &copy; 2025 &mdash; Mobile Technician Community</div>
    </div>

    <script>
      (function () {
        const ua = navigator.userAgent;
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        if (isAndroid || isIOS) {
          window.location.href = "https://mobile-repair-app-276b6.web.app";

      })();

  </body>
</html>
